name: Apply Fotodokumentace Migration 062

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/062_fotodokumentace_modul.sql'
      - 'scripts/apply-fotodokumentace-migration-062.mjs'
      - 'scripts/verify-fotodokumentace-production.mjs'
      - '.github/workflows/apply-fotodokumentace-migration.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check migration secrets
        id: secrets
        run: |
          if [ -n "${{ secrets.SUPABASE_DB_PASSWORD }}" ] || [ -n "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub secrets SUPABASE_DB_PASSWORD/SUPABASE_ACCESS_TOKEN nejsou nastaveny."
            echo "Spusťte SQL ručně: supabase/manual/062_fotodokumentace_columns_production.sql"
          fi

      - name: Apply migration 062
        if: steps.secrets.outputs.available == 'true'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/apply-fotodokumentace-migration-062.mjs

      - name: Verify fotodokumentace insert
        if: steps.secrets.outputs.available == 'true'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
          INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
        run: node scripts/verify-fotodokumentace-production.mjs
