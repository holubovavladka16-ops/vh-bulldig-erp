name: Deploy Fakturovač Production

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/081_fakturovac_module.sql'
      - 'supabase/migrations/082_fakturovac_storage_update.sql'
      - 'supabase/manual/081_082_fakturovac_production.sql'
      - 'scripts/apply-fakturovac-migrations-081-082.mjs'
      - 'scripts/verify-fakturovac-production.mjs'
      - 'scripts/deploy-fakturovac-production.mjs'
      - 'api/admin-apply-fakturovac-migrations.js'
      - 'src/pages/invoices/**'
      - 'src/lib/invoices/**'
      - 'src/components/invoices/**'
      - 'src/constants/modules.ts'
      - 'src/routes/AppRoutes.tsx'
      - '.github/workflows/deploy-fakturovac-production.yml'
      - '.github/workflows/vercel-production-deploy.yml'
  workflow_dispatch:

jobs:
  migrate-database:
    runs-on: ubuntu-latest
    environment: Production – vh-bulldig-erp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Fakturovač migrations 081–082
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_REGION: ${{ secrets.SUPABASE_DB_REGION }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/apply-fakturovac-migrations-081-082.mjs

      - name: Deploy send-invoice-email edge function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SKIP: SUPABASE_ACCESS_TOKEN chybí"
            exit 0
          fi
          npx supabase functions deploy send-invoice-email --project-ref khhalcjgvqoyskkjlkyg

  deploy-frontend:
    needs: migrate-database
    runs-on: ubuntu-latest
    environment: Production – vh-bulldig-erp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy via Vercel CLI
        id: vercel_cli
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            npx vercel@latest deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
            echo "method=cli" >> "$GITHUB_OUTPUT"
          else
            echo "Vercel CLI secrets chybí"
            exit 1
          fi

      - name: Deploy via Vercel Deploy Hook
        if: steps.vercel_cli.outcome == 'failure'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::error::Chybí VERCEL_TOKEN i VERCEL_DEPLOY_HOOK – frontend se nenasadí"
            exit 1
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Deploy hook odeslán, čekám 90 s…"
          sleep 90

      - name: Verify production
        env:
          PRODUCTION_URL: https://vh-bulldig-erp.vercel.app
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
          INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
        run: node scripts/verify-fakturovac-production.mjs
