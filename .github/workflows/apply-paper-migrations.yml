name: Apply Paper Migrations 053-058

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/05[3-8]_*.sql'
      - 'scripts/apply-paper-migrations-053-058.mjs'
      - '.github/workflows/apply-paper-migrations.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations 053-058
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/apply-paper-migrations-053-058.mjs
