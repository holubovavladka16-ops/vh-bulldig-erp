name: Deploy PDF8 Zakázky a mapa

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/06*_pdf8*.sql'
      - 'supabase/migrations/07*_pdf8*.sql'
      - 'scripts/apply-pdf8-migrations-production.mjs'
      - 'scripts/deploy-pdf8-zakazky-mapa-production.mjs'
      - 'scripts/verify-pdf8-production-smoke.mjs'
      - 'supabase/manual/*pdf8*'
      - '.github/workflows/deploy-pdf8-zakazky-mapa.yml'
  workflow_dispatch:
    inputs:
      skip_vercel:
        description: Přeskočit Vercel deploy (pouze DB)
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  deploy-database:
    runs-on: ubuntu-latest
    environment: Production – vh-bulldig-erp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply PDF8 migrations 068–074
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_REGION: ${{ secrets.SUPABASE_DB_REGION }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
          INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
          PRODUCTION_URL: https://erp.vhbulldig.cz
        run: node scripts/apply-pdf8-migrations-production.mjs

      - name: Upload backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf8-deploy-backup-${{ github.run_id }}
          path: backups/pdf8-deploy-*/
          retention-days: 30
          if-no-files-found: ignore

  deploy-frontend:
    needs: deploy-database
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.skip_vercel != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Chybí Vercel secrets – frontend deploy přeskočen"
            exit 0
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Vercel Production
        if: env.VERCEL_TOKEN != ''
        run: npx vercel@latest deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify production frontend
        run: node scripts/verify-pdf8-production-smoke.mjs
        env:
          PRODUCTION_URL: https://erp.vhbulldig.cz
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
