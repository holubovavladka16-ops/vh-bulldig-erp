name: Verify Form Check Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-form-check-migrations-060-061.mjs'
      - 'scripts/verify-form-check-production.mjs'
      - '.github/workflows/verify-form-check-production.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations 060-061
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/apply-form-check-migrations-060-061.mjs

      - name: E2E test form check workflow
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
          INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
          PRODUCTION_URL: https://erp.vhbulldig.cz
        run: node scripts/verify-form-check-production.mjs
